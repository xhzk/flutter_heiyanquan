name: flutter_heiyanquan
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.6.0

dependencies:
  dio: ^4.0.6
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # 状态管理
  get: ^4.7.2

  # 获取包信息
  package_info_plus: 8.3.1

  # 本地存储
  shared_preferences: ^2.5.3

  # icon
  flutter_svg: ^2.2.2
  badges: 3.1.2
  extended_image: ^10.0.1

  # 响应式
  flutter_screenutil: ^5.9.3

  # 启动图
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# 软件启动图 创建命令：flutter pub run flutter_native_splash:create
# https://pub.dev/packages/flutter_native_splash
flutter_native_splash:
  color: "#ffffff"
  image: "assets/icons/launcher_android.png"
  android_12:
    image: "assets/icons/launcher_android.png"
    icon_background_color: "#ffffff"
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svgs/

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat/Montserrat-Bold.ttf
          weight: 700
